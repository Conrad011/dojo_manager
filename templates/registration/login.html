<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – Dojo Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: #fff;
      border-radius: 20px;
      padding: 2.5rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,.4);
    }
    .login-logo {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #e94560, #764ba2);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
    }
    .btn-login {
      background: linear-gradient(135deg, #e94560, #764ba2);
      border: none;
      color: #fff;
      padding: .75rem;
      font-weight: 600;
      letter-spacing: .5px;
      transition: opacity .2s;
    }
    .btn-login:hover { opacity: .9; color: #fff; }
    .form-control:focus { border-color: #764ba2; box-shadow: 0 0 0 .2rem rgba(118,75,162,.15); }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="text-center mb-4">
      <div class="login-logo">
        <i class="bi bi-fire text-white fs-2"></i>
      </div>
      <h4 class="fw-bold mb-1">Dojo Manager</h4>
      <p class="text-muted small mb-0">Sistema de Gestão</p>
    </div>

    {% if form.errors %}
    <div class="alert alert-danger alert-sm py-2 small">
      <i class="bi bi-x-circle me-1"></i>
      Usuário ou senha incorretos. Tente novamente.
    </div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label fw-semibold small">Usuário</label>
        <div class="input-group">
          <span class="input-group-text bg-light border-end-0">
            <i class="bi bi-person text-muted"></i>
          </span>
          <input type="text" name="username" class="form-control border-start-0"
                 placeholder="Seu usuário" autofocus required>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold small">Senha</label>
        <div class="input-group">
          <span class="input-group-text bg-light border-end-0">
            <i class="bi bi-lock text-muted"></i>
          </span>
          <input type="password" name="password" class="form-control border-start-0"
                 placeholder="Sua senha" required>
        </div>
      </div>
      <input type="hidden" name="next" value="{{ next }}">
      <button type="submit" class="btn btn-login w-100 rounded-3">
        <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
      </button>
    </form>

    <p class="text-center text-muted small mt-4 mb-0">
      Dojo Manager &copy; {{ request.META.SERVER_NAME }}
    </p>
  </div>
</body>
</html>
